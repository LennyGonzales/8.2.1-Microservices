openapi: 3.0.3

info:
  title: API Réservation de Vols
  version: 1.0.0
  description: Web service REST de réservation de vols sécurisé par Keycloak (JWT Bearer)

servers:
  - url: http://localhost:8080/api
    description: Backend Spring Boot

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Vol:
      type: object
      required:
        - compagnieAerienne
        - numeroVol
        - place
        - prix
        - date
      properties:
        compagnieAerienne:
          type: string
          example: Air France
        numeroVol:
          type: string
          example: AF123
        place:
          type: string
          example: 12A
        prix:
          type: number
          format: double
          example: 350.0
        date:
          type: string
          format: date
          example: "2024-07-01"

    Profil:
      type: object
      required:
        - name
        - email
        - picture
      properties:
        name:
          type: string
          example: Test User
        email:
          type: string
          example: testuser@demo.local
        picture:
          type: string
          example: ""

paths:
  /vol:
    get:
      operationId: getVols
      summary: Liste des vols disponibles
      description: Retourne la liste statique des vols. JWT Keycloak requis.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liste des vols
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vol"
        "401":
          description: Token absent ou invalide

  /profil:
    get:
      operationId: getProfil
      summary: Profil de l'utilisateur connecté
      description: Retourne les informations de l'utilisateur extraites du JWT Keycloak.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profil utilisateur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profil"
        "401":
          description: Token absent ou invalide
