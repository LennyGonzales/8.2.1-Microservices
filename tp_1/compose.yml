services:
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - 3000:80
    volumes:
      - ./front:/usr/share/nginx/html
    networks:
      - tp1-network

  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    environment:
      # Depuis le conteneur back, Keycloak est joignable via le nom de service Docker
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/microservices-realm
    ports:
      - 8080:8080
    networks:
      - tp1-network
    depends_on:
      keycloak:
        condition: service_healthy

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      # curl et wget sont absents de l'image Keycloak 26.
      # On vérifie que le port 8080 (0x1F90) est en état LISTEN via /proc/net/tcp6.
      test: ["CMD-SHELL", "grep -q '1F90' /proc/net/tcp6 && grep -qr 'microservices-realm' /opt/keycloak/data/import"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    networks:
      - tp1-network

networks:
  tp1-network:
    driver: bridge
