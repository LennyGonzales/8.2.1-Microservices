spring:
  application:
    name: cours-microservice

  security:
    oauth2:
      client:
        registration:
          google:
            clientId: ${GOOGLE_CLIENT_ID}
            clientSecret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirectUri: http://localhost:8080/login/oauth2/code/google

server:
  servlet:
    contextPath: "/api"
