<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réservation de vols</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="icon">✈</div>
      <h1>Réservation de vols</h1>
      <p class="subtitle">Consultez les vols disponibles</p>
    </header>

    <section class="auth-section" id="auth-section">
      <div id="profile" class="profile hidden"></div>
      <a
        id="btn-google-login"
        class="btn-google"
        href="http://localhost:8080/api/oauth2/authorization/google"
      >
        Se connecter avec Google
      </a>
    </section>

    <div class="actions">
      <button type="button" id="btn-fetch">Récupérer les vols</button>
    </div>

    <div id="flights-result"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
