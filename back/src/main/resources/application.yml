spring:
  application:
    name: cours-microservice

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/microservices-realm}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak-service:8080/realms/microservices-realm/protocol/openid-connect/certs}

server:
  servlet:
    contextPath: "/api"
