services:
  front:
    image: registry.infres.fr/front
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - 3000:80
    volumes:
      - ./front:/usr/share/nginx/html
    networks:
      - tp1-network

  back:
    image: registry.infres.fr/back
    build:
      context: ./back
      dockerfile: Dockerfile
    environment:
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/microservices-realm
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/microservices-realm/protocol/openid-connect/certs
    ports:
      - 8080:8080
    networks:
      - tp1-network
    depends_on:
      keycloak:
        condition: service_healthy

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "grep -q '1F90' /proc/net/tcp6 && grep -qr 'microservices-realm' /opt/keycloak/data/import"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    networks:
      - tp1-network

networks:
  tp1-network:
    driver: bridge
