<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réservation de vols</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="icon">✈</div>
      <h1>Réservation de vols</h1>
      <p class="subtitle">Consultez les vols disponibles</p>
    </header>

    <section class="auth-section" id="auth-section">
      <div id="profile" class="profile hidden"></div>
      <button
        id="btn-keycloak-login"
        class="btn-google"
        type="button"
      >
        Se connecter avec Keycloak
      </button>
      <button
        id="btn-keycloak-logout"
        class="btn-logout hidden"
        type="button"
      >
        Se déconnecter
      </button>
    </section>

    <div class="actions">
      <button type="button" id="btn-fetch">Récupérer les vols</button>
    </div>

    <div id="flights-result"></div>
  </div>

  <script src="/config.js"></script>
  <script type="importmap">
  {
    "imports": {
      "superagent": "https://cdn.jsdelivr.net/npm/superagent@5.3.1/+esm"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
