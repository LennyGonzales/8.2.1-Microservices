server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Le client OpenAPI généré importe les modules sans extension (.js).
        # Les navigateurs ne résolvent pas ces chemins : on sert le fichier .js correspondant.
        try_files $uri $uri.js $uri/ =404;
    }
}
